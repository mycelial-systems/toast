<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Component Examples</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        substrate-toast:not(:defined) {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Toast Component</h1>
        <p class="subtitle">
            A toast notification component
        </p>

        <div class="toasters">
            <button id="success">Succeed</button>
            <button id="danger">Error</button>
            <button id="primary">Primary</button>
            <button id="neutral">Neutral</button>
            <button id="warning">Warning</button>
            <button id="permatoast">Permanent Toast</button>
            <button id="no-timer">No Timer</button>
        </div>
    </div>

    <substrate-toast class="success" success closable>
        This is a toast notification &hellip;
    </substrate-toast>

    <substrate-toast class="success" success closable open>
        This is a toast notification &hellip;
    </substrate-toast>

    <!-- ['primary', 'success', 'neutral', 'warning', 'danger'] -->

    <substrate-toast class="danger" danger closable>
        This is an error toast &hellip;
    </substrate-toast>

    <substrate-toast class="primary" primary closable>
        Primary
    </substrate-toast>
    <substrate-toast class="neutral" neutral closable>
        Neutral
    </substrate-toast>
    <substrate-toast class="warning" warning closable>
        Warning
    </substrate-toast>

    <substrate-toast id="permanent-toast" neutral closable>
        The permanent toast &hellip;
    </substrate-toast>

    <substrate-toast
        id="no-timer-toast"
        success
        closable
        timer="false"
    >
        Toast without visual timer &hellip;
    </substrate-toast>

    <script type="module" src="./index.ts"></script>
</body>
</html>
